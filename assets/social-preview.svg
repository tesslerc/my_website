<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Chen Tessler: Motion priors for System 1 control</title>
  <desc id="desc">A dark systems diagram for Chen Tessler's research in motion generation, control, and robotics.</desc>
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2c" />
      <stop offset="1" stop-color="#08111f" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6b4a" stop-opacity="0" />
      <stop offset="0.5" stop-color="#ff6b4a" stop-opacity="0.8" />
      <stop offset="1" stop-color="#87d9df" stop-opacity="0" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#d5e4f0" stroke-opacity="0.07" stroke-width="1" />
    </pattern>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#field)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <path d="M 760 88 C 886 148 866 256 1004 293 C 1102 320 1118 420 1192 486" fill="none" stroke="#87d9df" stroke-opacity="0.22" stroke-width="2" />
  <path d="M 756 89 C 872 180 796 286 931 339 C 1012 371 1019 464 1176 521" fill="none" stroke="#ff6b4a" stroke-dasharray="5 12" stroke-opacity="0.76" stroke-width="2" />
  <path d="M 694 106 L 694 512" stroke="#d5e4f0" stroke-opacity="0.14" />
  <path d="M 62 514 L 1138 514" stroke="url(#glow)" stroke-width="2" />
  <circle cx="760" cy="89" r="8" fill="#ff6b4a" />
  <circle cx="760" cy="89" r="22" fill="none" stroke="#ff6b4a" stroke-opacity="0.35" />
  <circle cx="931" cy="339" r="8" fill="#87d9df" />
  <circle cx="931" cy="339" r="22" fill="none" stroke="#87d9df" stroke-opacity="0.28" />
  <circle cx="1092" cy="471" r="8" fill="#d9b77a" />
  <circle cx="1092" cy="471" r="22" fill="none" stroke="#d9b77a" stroke-opacity="0.28" />
  <g fill="#f2eee6" font-family="IBM Plex Sans, Arial, sans-serif">
    <text x="64" y="104" fill="#ff6b4a" font-family="IBM Plex Mono, monospace" font-size="18" letter-spacing="4">CHEN TESSLER / NVIDIA</text>
    <text x="64" y="248" font-size="64" font-weight="600" letter-spacing="-2">Motion priors for</text>
    <text x="64" y="326" fill="#87d9df" font-size="64" font-weight="600" letter-spacing="-2">System 1 control.</text>
    <text x="64" y="408" fill="#b8c5d0" font-size="22">Motion generation, control, learning, and robotics.</text>
    <text x="64" y="566" fill="#738292" font-family="IBM Plex Mono, monospace" font-size="16" letter-spacing="3">REUSABLE MOTION PRIORS / OPEN SOURCE RESEARCH</text>
  </g>
  <g fill="#738292" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="2">
